name: 自动构建与发布

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 获取项目信息
        id: project-info
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | tr -d '\n')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 设置Java环境
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven

      - name: Maven构建项目
        run: mvn -B clean package

      - name: 验证构建结果
        run: |
          JARS_FOUND=false
          for dir in bukkit bungeecord velocity; do
            if ls "$dir"/target/CatSeedLogin*.jar 1>/dev/null 2>&1; then
              JARS_FOUND=true
            fi
          done
          if [ "$JARS_FOUND" = false ]; then
            echo "::error::构建失败，未找到JAR文件"
            exit 1
          fi
          echo "=== 构建产物 ==="
          for dir in bukkit bungeecord velocity; do
            ls -lh "$dir"/target/CatSeedLogin*.jar 2>/dev/null || true
          done

      - name: 获取提交信息
        id: get-commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:%B)
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 计算文件哈希
        id: file-hashes
        run: |
          set -euo pipefail

          echo "## 📦 文件校验哈希" > hashes.md
          echo '```' >> hashes.md

          found_files=false
          for dir in bukkit bungeecord velocity; do
            for file in "$dir"/target/CatSeedLogin*.jar; do
              if [[ -f "$file" && ! "$file" == *original-* ]]; then
                hash=$(sha256sum "$file" | awk '{print $1}')
                filename=$(basename "$file")
                echo "${filename}: ${hash}" >> hashes.md
                found_files=true
              fi
            done
          done

          if [[ "$found_files" == false ]]; then
            echo "::warning::未找到可校验文件"
            echo "hash_content=未生成校验信息" >> $GITHUB_OUTPUT
          else
            echo '```' >> hashes.md
            echo "hash_content<<EOF" >> $GITHUB_OUTPUT
            cat hashes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: 记录构建时间
        id: get-date
        run: |
          echo "date=$(date +'%Y年%m月%d日 %H时%M分%S秒')" >> $GITHUB_OUTPUT

      - name: 创建版本发布
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.project-info.outputs.version }}
          name: CatSeedLogin-v${{ steps.project-info.outputs.version }}
          body: |
            ## 📝 提交信息
            ```
            ${{ steps.get-commit.outputs.commit_msg }}
            ```

            ## 🔧 构建详情
            - 版本号: ${{ steps.project-info.outputs.version }}
            - 提交哈希: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - 构建时间: ${{ steps.get-date.outputs.date }}

            ## 📦 模块说明
            | 模块 | 说明 |
            |------|------|
            | CatSeedLogin-bukkit | Bukkit/Spigot/Paper/Folia 服务端插件 |
            | CatSeedLogin-bungeecord | BungeeCord 代理端插件 |
            | CatSeedLogin-velocity | Velocity 代理端插件 |

            ## 🔍 文件校验
            ${{ steps.file-hashes.outputs.hash_content }}

            > 本发布由 GitHub Actions 自动生成
          files: |
            bukkit/target/CatSeedLogin-*.jar
            bungeecord/target/CatSeedLogin-bungeecord-*.jar
            velocity/target/CatSeedLogin-velocity-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
